<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Instagram Analytics Pro</title>
    <!-- Favicon and Touch Icons -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}">
    <!-- Apply saved theme before first paint (Bootstrap reads data-bs-theme) -->
    <meta name="color-scheme" content="light dark">
    <script>
    {
      const colorScheme = localStorage.getItem("color-scheme") || "dark";
      document.querySelector('meta[name="color-scheme"]').content = colorScheme;
      document.documentElement.style.colorScheme = colorScheme;
      document.documentElement.setAttribute("data-bs-theme", colorScheme);
    }
    </script>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-app), rgba(168, 85, 247, 0.05));
        }
    </style>
</head>
<body>

    <div class="container" style="max-width: 440px;">
        <div class="text-center mb-4">
            <a href="/" class="fw-bold fs-3 text-decoration-none gradient-text"><img src="{{ url_for('static', filename='images/InstaTrackPro_icon.svg') }}" alt="Logo" class="me-2" style="width: 32px; height: 32px;">InstaTrack Pro</a>
            <h5 class="text-secondary mt-2">Get started for free</h5>
        </div>
        
        <div class="glass-card shadow-lg p-4">
            <div id="alert-container"></div>
            
            <form id="register-form">
                <div class="mb-3">
                    <label for="email" class="form-label" data-i18n="lbl_email">Email / Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                        <input type="text" class="form-control form-glass border-start-0 ps-1" id="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control form-glass border-start-0 ps-1" id="password" placeholder="Min. 6 characters" required>
                    </div>
                </div>
                <!-- Role selection removed. All users default to 'user' -->
                <button type="submit" class="btn gradient-btn w-100 py-2.5 mt-2"><i class="bi bi-person-plus-fill me-1"></i>Create Account</button>
            </form>
            
            <div class="text-center mt-4">
                <span class="text-muted small">Already have an account?</span>
                <a href="/login" class="small text-decoration-none fw-bold ms-1">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = '';
            
            if (password.length < 6) {
                alertContainer.innerHTML = `<div class="alert alert-danger">Password must be at least 6 characters.</div>`;
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    alertContainer.innerHTML = `<div class="alert alert-success">Registration successful! Redirecting to login...</div>`;
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1200);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger">${data.error || 'Registration failed'}</div>`;
                }
            } catch (err) {
                alertContainer.innerHTML = `<div class="alert alert-danger">Server connection error. Please try again.</div>`;
            }
        });
    </script>
</body>
</html>
