<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Instagram Analytics Pro</title>
    <!-- Favicon and Touch Icons -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}">
    <!-- Apply saved theme before first paint (Bootstrap reads data-bs-theme) -->
    <meta name="color-scheme" content="light dark">
    <script>
    {
      const colorScheme = localStorage.getItem("color-scheme") || "dark";
      document.querySelector('meta[name="color-scheme"]').content = colorScheme;
      document.documentElement.style.colorScheme = colorScheme;
      document.documentElement.setAttribute("data-bs-theme", colorScheme);
    }
    </script>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-app), rgba(168, 85, 247, 0.05));
        }
    </style>
</head>
<body>

    <div class="container" style="max-width: 440px;">
        <!-- Language Switcher -->
        <div class="d-flex justify-content-end mb-2 gap-2">
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-secondary dropdown-toggle d-flex align-items-center gap-1" type="button" data-bs-toggle="dropdown">
                    <img id="lang-flag-img" src="https://flagcdn.com/w20/gb.png" alt="lang" width="18" style="border-radius:2px;">
                    <span id="lang-flag-label">EN</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end border-card shadow-sm">
                    <li><a class="dropdown-item d-flex align-items-center gap-2" href="#" onclick="changeLanguage('en'); return false;"><img src="https://flagcdn.com/w20/gb.png" width="18" alt="EN"> English</a></li>
                    <li><a class="dropdown-item d-flex align-items-center gap-2" href="#" onclick="changeLanguage('uz'); return false;"><img src="https://flagcdn.com/w20/uz.png" width="18" alt="UZ"> O'zbek</a></li>
                    <li><a class="dropdown-item d-flex align-items-center gap-2" href="#" onclick="changeLanguage('ru'); return false;"><img src="https://flagcdn.com/w20/ru.png" width="18" alt="RU"> Русский</a></li>
                </ul>
            </div>
        </div>

        <div class="text-center mb-4">
            <a href="/" class="fw-bold fs-3 text-decoration-none gradient-text"><img src="{{ url_for('static', filename='images/InstaTrackPro_icon.svg') }}" alt="Logo" class="me-2" style="width: 32px; height: 32px;">InstaTrack Pro</a>
            <h5 class="text-secondary mt-2" data-i18n="login_title">Sign in to your account</h5>
        </div>
        
        <div class="glass-card shadow-lg p-4">
            <div id="alert-container"></div>
            
            <form id="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label" data-i18n="login_email">Email / Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                        <input type="text" class="form-control form-glass border-start-0 ps-1" id="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label" data-i18n="login_password">Password</label>
                        <a href="#" class="small text-decoration-none" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal" data-i18n="login_forgot">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control form-glass border-start-0 ps-1" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn gradient-btn w-100 py-2.5 mt-2"><i class="bi bi-box-arrow-in-right me-1"></i><span data-i18n="login_btn">Sign In</span></button>
            </form>
            
            <div class="text-center mt-4">
                <span class="text-muted small" data-i18n="login_no_account">Don't have an account?</span>
                <a href="/register" class="small text-decoration-none fw-bold ms-1" data-i18n="login_create">Create free account</a>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" id="forgotPasswordModalLabel">Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small">Enter your email address and we'll simulate sending you a password reset link.</p>
                    <form id="forgot-password-form">
                        <div class="mb-3">
                            <label for="forgot-email" class="form-label">Email Address</label>
                            <input type="email" class="form-control form-glass" id="forgot-email" placeholder="name@example.com" required>
                        </div>
                        <button type="submit" class="btn gradient-btn w-100">Send Reset Link</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = '';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alertContainer.innerHTML = `<div class="alert alert-success">Login successful! Redirecting...</div>`;
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 800);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger">${data.error || 'Login failed'}</div>`;
                }
            } catch (err) {
                alertContainer.innerHTML = `<div class="alert alert-danger">Server connection error. Please try again.</div>`;
            }
        });

        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;
            const modalBody = document.querySelector('#forgotPasswordModal .modal-body');
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                if (response.ok) {
                    modalBody.innerHTML = `
                        <div class="alert alert-success">
                            ${data.message}
                            <hr>
                            <p class="mb-0 small text-truncate"><strong>Development Link:</strong><br><a href="${data.reset_link_dev}" class="alert-link small" target="_blank">${data.reset_link_dev}</a></p>
                        </div>
                    `;
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Connection error');
            }
        });
    </script>
</body>
</html>
